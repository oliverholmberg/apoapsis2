name: Build & Deploy iOS to App Store Connect

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    name: Build Unity iOS & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Cache ─────────────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'ProjectSettings/*.asset') }}
          restore-keys: |
            Library-iOS-
            Library-

      # ── Install Unity ─────────────────────────────────────────
      - name: Install Unity Hub and Editor
        run: |
          # Install Unity Hub
          brew install --cask unity-hub

          # Wait for Hub to be ready
          sleep 5

          # Install Unity Editor with iOS support using Hub CLI
          # Unity Hub needs the changeset hash for exact versions
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version 6000.3.11f1 \
            --changeset 3000ef702840 \
            --module ios \
            --childModules 2>&1 || true

          # Verify installation
          if [ -d "/Applications/Unity/Hub/Editor/6000.3.11f1" ]; then
            echo "Unity Editor installed successfully"
          else
            echo "Trying alternative install path..."
            # List what's available
            /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless editors --installed 2>&1 || true
            ls /Applications/Unity/Hub/Editor/ 2>/dev/null || true
            echo "::error::Unity Editor installation failed"
            exit 1
          fi

      # ── Activate Unity License ────────────────────────────────
      - name: Activate Unity License
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          UNITY="/Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app/Contents/MacOS/Unity"

          # Login and activate via batch mode
          "$UNITY" \
            -quit \
            -batchmode \
            -nographics \
            -logFile - \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -projectPath "$(pwd)" \
            2>&1 || true

          # Verify license exists
          if ls ~/Library/Unity/licenses/Unity*.xml 1>/dev/null 2>&1; then
            echo "Unity license activated successfully"
          else
            echo "::error::Unity license activation failed"
            exit 1
          fi

      # ── Unity Build ───────────────────────────────────────────
      - name: Build Unity project for iOS
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          UNITY="/Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app/Contents/MacOS/Unity"

          "$UNITY" \
            -quit \
            -batchmode \
            -nographics \
            -projectPath "$(pwd)" \
            -executeMethod BuildScript.BuildiOSDevice \
            -logFile -

      # ── Ruby & Fastlane ──────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── Deploy via Fastlane ──────────────────────────────────
      - name: Deploy to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ios deploy
