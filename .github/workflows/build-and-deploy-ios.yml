name: Build & Deploy iOS to App Store Connect

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    name: Build Unity iOS & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Cache ─────────────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'ProjectSettings/*.asset') }}
          restore-keys: |
            Library-iOS-
            Library-

      # ── Install Unity via brew (cached by GitHub runner) ──────
      - name: Install Unity
        run: |
          brew install --cask unity-hub
          sleep 3

          # Unity Hub headless install - try multiple version formats
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install-path --set /Applications/Unity/Hub/Editor 2>&1 || true
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install --version 6000.3.11f1 --module ios --childModules 2>&1 || \
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install -v 6000.3.11f1 -m ios 2>&1 || true

          # If Hub install failed, download directly
          if ! ls /Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app 2>/dev/null; then
            echo "Hub install failed, downloading directly..."
            CHANGESET="3000ef702840"
            curl -L -o /tmp/Unity.pkg "https://download.unity3d.com/download_unity/${CHANGESET}/MacEditorInstaller/Unity.pkg"
            curl -L -o /tmp/iOS.pkg "https://download.unity3d.com/download_unity/${CHANGESET}/MacEditorTargetInstaller/UnitySetup-iOS-Support-for-Editor-6000.3.11f1.pkg"
            sudo installer -pkg /tmp/Unity.pkg -target /
            sudo installer -pkg /tmp/iOS.pkg -target /

            # Create expected directory structure
            UNITY_PATH="$(find /Applications/Unity* -name Unity -type f -path '*/MacOS/Unity' 2>/dev/null | head -1)"
            UNITY_APP="$(dirname "$(dirname "$UNITY_PATH")")"
            echo "Found Unity at: $UNITY_APP"

            if [ ! -d "/Applications/Unity/Hub/Editor/6000.3.11f1" ]; then
              sudo mkdir -p /Applications/Unity/Hub/Editor/6000.3.11f1
              sudo ln -sf "$UNITY_APP" /Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app
            fi
          fi

          echo "UNITY_PATH=/Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app/Contents/MacOS/Unity" >> $GITHUB_ENV

      # ── Activate Unity License ────────────────────────────────
      - name: Activate Unity License
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          # Find the actual Unity binary
          UNITY="${UNITY_PATH:-$(find /Applications/Unity* -name Unity -type f -path '*/MacOS/Unity' 2>/dev/null | head -1)}"
          echo "Using Unity at: $UNITY"

          # Activate license - the entitlement activation succeeds even if exit code is non-zero
          "$UNITY" \
            -quit \
            -batchmode \
            -nographics \
            -logFile /dev/stdout \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" 2>&1 || true

          # Check if license was created
          if ls ~/Library/Unity/licenses/Unity*.xml 1>/dev/null 2>&1; then
            echo "✅ Unity license activated"
          else
            echo "::error::Unity license activation failed - no license file found"
            exit 1
          fi

      # ── Unity Build ───────────────────────────────────────────
      - name: Build Unity project for iOS
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          UNITY="${UNITY_PATH:-$(find /Applications/Unity* -name Unity -type f -path '*/MacOS/Unity' 2>/dev/null | head -1)}"

          "$UNITY" \
            -quit \
            -batchmode \
            -nographics \
            -projectPath "$(pwd)" \
            -executeMethod BuildScript.BuildiOSDevice \
            -logFile /dev/stdout

      # ── Ruby & Fastlane ──────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── Deploy via Fastlane ──────────────────────────────────
      - name: Deploy to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ios deploy
