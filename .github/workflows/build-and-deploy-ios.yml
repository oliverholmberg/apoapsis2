name: Build & Deploy iOS to App Store Connect

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    name: Build Unity iOS & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Cache ─────────────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'ProjectSettings/*.asset') }}
          restore-keys: |
            Library-iOS-
            Library-

      # ── Unity Build ───────────────────────────────────────────
      - name: Build Unity project for iOS
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: iOS
          buildMethod: BuildScript.BuildiOSDevice
          buildsPath: Builds
          unityVersion: 6000.3.11f1
          allowDirtyBuild: true

      # ── Inject App Store Icon ────────────────────────────────
      - name: Inject 1024x1024 App Store icon
        run: |
          ICON_SRC="Assets/Icons/AppIcon-1024.png"
          ICON_DST="Builds/iOS/Unity-iPhone/Images.xcassets/AppIcon.appiconset"

          if [ -f "$ICON_SRC" ] && [ -d "$ICON_DST" ]; then
            cp "$ICON_SRC" "$ICON_DST/Icon-AppStore-1024.png"
            python3 -c "
          import json, os
          path = os.path.join('$ICON_DST', 'Contents.json')
          with open(path) as f:
              data = json.load(f)
          data['images'] = [i for i in data['images'] if i.get('size') != '1024x1024']
          data['images'].append({
              'filename': 'Icon-AppStore-1024.png',
              'idiom': 'ios-marketing',
              'scale': '1x',
              'size': '1024x1024'
          })
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          "
            echo "Injected 1024x1024 App Store icon."
          else
            echo "::warning::App Store icon source or destination not found"
          fi

      # ── Ruby & Fastlane ──────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── Deploy via Fastlane ──────────────────────────────────
      - name: Deploy to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ios deploy
