name: Build & Deploy iOS to App Store Connect

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    name: Build Unity iOS & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Cache ─────────────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'ProjectSettings/*.asset') }}
          restore-keys: |
            Library-iOS-
            Library-

      # ── Install Unity ─────────────────────────────────────────
      - name: Install Unity Editor
        run: |
          # Download Unity 6000.3.11f1 installer directly
          CHANGESET="3000ef702840"
          PKG_URL="https://download.unity3d.com/download_unity/${CHANGESET}/MacEditorInstaller/Unity.pkg"
          IOS_URL="https://download.unity3d.com/download_unity/${CHANGESET}/MacEditorTargetInstaller/UnitySetup-iOS-Support-for-Editor-6000.3.11f1.pkg"

          echo "Downloading Unity Editor..."
          curl -L -o /tmp/Unity.pkg "$PKG_URL"
          echo "Downloading iOS Build Support..."
          curl -L -o /tmp/UnitySetup-iOS.pkg "$IOS_URL"

          echo "Installing Unity Editor..."
          sudo installer -pkg /tmp/Unity.pkg -target /
          echo "Installing iOS Build Support..."
          sudo installer -pkg /tmp/UnitySetup-iOS.pkg -target /

          # Verify
          ls /Applications/Unity/Unity.app/Contents/MacOS/Unity && echo "Unity installed" || \
          (ls /Applications/Unity/ 2>/dev/null; echo "::error::Unity not found"; exit 1)

      # ── Activate Unity License ────────────────────────────────
      - name: Activate Unity License
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          # Find Unity binary
          UNITY="$(find /Applications/Unity* -name Unity -type f -path '*/MacOS/Unity' | head -1)"
          echo "Using Unity at: $UNITY"

          # Login and activate via batch mode
          "$UNITY" \
            -quit \
            -batchmode \
            -nographics \
            -logFile - \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -projectPath "$(pwd)" \
            2>&1 || true

          # Verify license exists
          if ls ~/Library/Unity/licenses/Unity*.xml 1>/dev/null 2>&1; then
            echo "Unity license activated successfully"
          else
            echo "::error::Unity license activation failed"
            exit 1
          fi

      # ── Unity Build ───────────────────────────────────────────
      - name: Build Unity project for iOS
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          UNITY="$(find /Applications/Unity* -name Unity -type f -path '*/MacOS/Unity' | head -1)"

          "$UNITY" \
            -quit \
            -batchmode \
            -nographics \
            -projectPath "$(pwd)" \
            -executeMethod BuildScript.BuildiOSDevice \
            -logFile -

      # ── Ruby & Fastlane ──────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── Deploy via Fastlane ──────────────────────────────────
      - name: Deploy to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ios deploy
