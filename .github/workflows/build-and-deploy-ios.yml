name: Build & Deploy iOS to App Store Connect

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    name: Build Unity iOS & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Cache ─────────────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'ProjectSettings/*.asset') }}
          restore-keys: |
            Library-iOS-
            Library-

      # ── Unity Build ───────────────────────────────────────────
      - name: Build Unity project for iOS
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: iOS
          buildMethod: BuildScript.BuildiOSDevice
          buildsPath: Builds
          unityVersion: 6000.3.11f1

      # ── Ruby & Fastlane ──────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ── Fix Xcode project for manual signing ─────────────────
      - name: Set Xcode signing settings
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Ensure the generated Xcode project uses manual signing
          # so Fastlane can control code signing
          sed -i '' \
            "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" \
            Builds/iOS/Unity-iPhone.xcodeproj/project.pbxproj || true

      # ── Deploy via Fastlane ──────────────────────────────────
      - name: Deploy to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: bundle exec fastlane ios deploy
